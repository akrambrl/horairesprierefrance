name: 🕌 Mise à jour articles islamiques

on:
  schedule:
    # Chaque nuit à 01h00 heure de Paris (00h00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permet aussi de lancer manuellement depuis GitHub

jobs:
  update-articles:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write   # Pour pouvoir pusher sur le repo

    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install anthropic

      - name: 🤖 Générer les articles via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_articles.py

      - name: 📤 Commit et push des articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🕌 Articles du $(date +'%d/%m/%Y') mis à jour"
          git push
